id: task.t5-08c4d3e
kind: task
version: 1
title: decouple local raw PTY input from synchronous transport writes
status: superseded
priority: high
design_ref:
  doc: docs/raw-pty-tunnel-design.md
  why:
    - cross-host review found that local stdin now bypasses the UI loop but can still block on authority transport writes
    - SSH parity requires the terminal input reader to avoid direct network or socket backpressure
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.t5-08c4d3d.done
linked_primitives:
  - primitive.verification-refresh
