  - primitive.task-board-sync
done_criteria:
  - local stdin raw-mode reads enqueue bytes without synchronously writing to the authority transport
  - a dedicated raw-input writer owns authority transport writes and preserves byte ordering
  - burst coalescing does not add a fixed sleep before first-byte delivery
  - backpressure is observable and does not silently stall the terminal input reader
verification:
  - cargo test remote_main_slot_pane_runtime
  - manual: compare first-keystroke latency against ssh on the same remote host
touched_paths:
  - src/runtime/remote_main_slot_pane_runtime.rs
