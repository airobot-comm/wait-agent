kind: state
version: 1
summary:
  purpose: hot task history only; keep one latest-state snapshot per near-term task and keep this file small enough for selective on-demand loading
archive_file: .agents/state/task-history-archive.yaml
hot_history_policy:
  keep:
    - the active task
    - its direct predecessor or dependency tasks when they define current invariants
    - its immediate next queue when handoff context is likely to matter soon
  avoid:
    - repeated in_progress lifecycle snapshots for older tasks
    - long-tail historical records that are not shaping the active queue
history:
  - task_id: task.remote-exit-latency-1
    status: in_progress
    summary: active work moves to acknowledged local catalog changed notify for the remote session sync owner so WaitAgent-managed remote session exits can wake sync immediately instead of waiting for the 500ms periodic catalog diff
    source_of_truth:
      file: .agents/tasks/current.yaml
      reference: status
  - task_id: task.remote-create-9f-acceptance
    status: done
    summary: corrected Ctrl-W and Ctrl-S behavior is accepted by user validation, covering first connect, existing endpoint session creation, selected remote Ctrl-S creation, and the no-direct-dial design boundary
    source_of_truth:
      file: .agents/tasks/backlog.yaml
      reference: next
  - task_id: task.remote-create-9e-daemon-parity
    status: done
    summary: __remote-daemon parity is accepted as part of the corrected Ctrl-W flow; SSH bootstrap default-session publication now matches the manual waitagent --connect contract from the task design
    source_of_truth:
      file: .agents/tasks/backlog.yaml
      reference: next
  - task_id: task.remote-exit-latency-2
    status: ready
    summary: next slice will wire WaitAgent-managed target lifecycle paths to the acknowledged notify and remove normal-path dependence on the 500ms sync poll
    source_of_truth:
      file: .agents/tasks/backlog.yaml
      reference: next
  - task_id: task.remote-exit-latency-3
    status: ready
    summary: later slice will replace TargetExited hot-path all-socket tmux discovery with a live workspace socket registry
    source_of_truth:
      file: .agents/tasks/backlog.yaml
      reference: next
  - task_id: task.remote-exit-latency-4
    status: ready
    summary: final slice will validate end-to-end remote session exit latency and remove temporary diagnostics that are no longer needed
    source_of_truth:
      file: .agents/tasks/backlog.yaml
      reference: next
