<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaitAgent logo</title>
  <desc id="desc">Multiple agent sessions multiplexed into one active terminal cursor. Left-right structure: waiting queue on the left, active cursor on the right.</desc>

  <!-- Background rounded rect -->
  <rect x="48" y="48" width="416" height="416" rx="112" fill="#FCF7F4"/>

  <!-- App corners (frame) -->
  <path d="M176 132H144C117.49 132 96 153.49 96 180V202" stroke="#5A2A2A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M336 132H368C394.51 132 416 153.49 416 180V202" stroke="#5A2A2A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M176 380H144C117.49 380 96 358.51 96 332V310" stroke="#5A2A2A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M336 380H368C394.51 380 416 358.51 416 332V310" stroke="#5A2A2A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left side: vertical queue (agent sessions waiting) -->
  <!-- Three stacked dots connected by a line -->
  <line x1="172" y1="196" x2="172" y2="316" stroke="#ECD8D3" stroke-width="6" stroke-linecap="round"/>
  <circle cx="172" cy="200" r="16" stroke="#ECD8D3" stroke-width="6"/>
  <circle cx="172" cy="256" r="16" stroke="#C98A5A" stroke-width="6"/>
  <circle cx="172" cy="312" r="16" stroke="#ECD8D3" stroke-width="6"/>

  <!-- Center: flow arrow (multiplexing) -->
  <path d="M200 256H276" stroke="#5A2A2A" stroke-width="6" stroke-linecap="round"/>
  <path d="M265 240L285 256L265 272" stroke="#5A2A2A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right side: terminal cursor (active session) -->
  <path d="M300 240L340 240L340 272L300 272Z" stroke="#C91F24" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M300 256H350" stroke="#C91F24" stroke-width="7" stroke-linecap="round"/>

  <!-- Subtle scan ring behind the active cursor -->
  <circle cx="325" cy="256" r="60" stroke="#ECD8D3" stroke-width="5"/>
  <circle cx="325" cy="256" r="60" stroke="#C91F24" stroke-width="6" stroke-linecap="round" stroke-dasharray="100 80 50 148"/>
</svg>
