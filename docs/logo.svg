<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="#0a0a0a"/>

  <!-- "W" — three strokes forming the W -->
  <path d="M55 310 L85 110 L130 200 L175 110 L205 310"
        stroke="url(#g)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "A" — left, right and crossbar -->
  <path d="M240 310 L292 110 L345 310"
        stroke="url(#g)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="262" y1="230" x2="322" y2="230"
        stroke="url(#g)" stroke-width="14" stroke-linecap="round"/>

  <!-- Terminal prompt cursor line -->
  <rect x="55" y="350" width="290" height="5" rx="2.5" fill="#ffffff" opacity="0.15"/>

  <!-- Agent activity dot (cyan accent) -->
  <circle cx="345" cy="310" r="7" fill="#00ffc8" opacity="0.9"/>
</svg>
