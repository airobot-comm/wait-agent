<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#666666"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="#0a0a0a"/>

  <!-- Workspace boundary (subtle) -->
  <rect x="52" y="52" width="296" height="296" rx="20"
        stroke="#ffffff" stroke-width="4" opacity="0.06"/>

  <!-- Converging connection lines (top agents → center → output) -->
  <line x1="110" y1="120" x2="200" y2="190" stroke="#ffffff" stroke-width="4" opacity="0.12"/>
  <line x1="200" y1="100" x2="200" y2="190" stroke="#ffffff" stroke-width="4" opacity="0.12"/>
  <line x1="290" y1="120" x2="200" y2="190" stroke="#ffffff" stroke-width="4" opacity="0.12"/>
  <line x1="200" y1="190" x2="200" y2="270" stroke="url(#g)" stroke-width="5"/>

  <!-- Agent session nodes (inactive) -->
  <circle cx="110" cy="120" r="15" stroke="#ffffff" stroke-width="4" opacity="0.25"/>
  <circle cx="200" cy="100" r="15" stroke="#ffffff" stroke-width="4" opacity="0.25"/>
  <circle cx="290" cy="120" r="15" stroke="#ffffff" stroke-width="4" opacity="0.25"/>

  <!-- Active focused session -->
  <circle cx="200" cy="270" r="15" fill="#00ffc8" opacity="0.9"/>
</svg>
