name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  release-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison pkg-config libevent-dev libncurses-dev \
            build-essential automake autoconf \
            rpm

      - name: Install Rust toolchain
        run: rustup show

      - name: cargo build --release
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cargo deb --output "waitagent_${VERSION}_amd64.deb"

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build .rpm package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p rpm-home
          cargo generate-rpm --output "waitagent-${VERSION}-1.x86_64.rpm"

      - name: Build .tar.gz archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf "waitagent-${VERSION}-x86_64-linux.tar.gz" \
            -C target/release waitagent

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            waitagent_*.deb
            waitagent-*.rpm
            waitagent-*-x86_64-linux.tar.gz

  release-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            pkg_config: /opt/homebrew/opt/ncurses/lib/pkgconfig:/opt/homebrew/opt/libevent/lib/pkgconfig
            ldflags: -L/opt/homebrew/opt/ncurses/lib -L/opt/homebrew/opt/libevent/lib
            cppflags: -I/opt/homebrew/opt/ncurses/include -I/opt/homebrew/opt/libevent/include
            dmg: true
          - target: x86_64-apple-darwin
            arch: x86_64
            pkg_config: /opt/homebrew/opt/ncurses/lib/pkgconfig:/opt/homebrew/opt/libevent/lib/pkgconfig
            ldflags: -L/opt/homebrew/opt/ncurses/lib -L/opt/homebrew/opt/libevent/lib
            cppflags: -I/opt/homebrew/opt/ncurses/include -I/opt/homebrew/opt/libevent/include
            dmg: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          brew install bison pkg-config libevent ncurses automake autoconf

      - name: Install Rust toolchain
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - name: cargo build --release (${{ matrix.target }})
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PKG_CONFIG_PATH: ${{ matrix.pkg_config }}
          LDFLAGS: ${{ matrix.ldflags }}
          CPPFLAGS: ${{ matrix.cppflags }}

      - name: Build .tar.gz archive (${{ matrix.arch }})
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf "waitagent-${VERSION}-${{ matrix.arch }}-macos.tar.gz" \
            -C "target/${{ matrix.target }}/release" waitagent

      - name: Build .dmg package (${{ matrix.arch }})
        if: ${{ matrix.dmg }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/package-dmg.sh
          ./scripts/package-dmg.sh \
            "target/${{ matrix.target }}/release/waitagent" \
            "waitagent-${VERSION}-${{ matrix.arch }}-macos.dmg" \
            "${VERSION}"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            waitagent-*-${{ matrix.arch }}-macos.tar.gz
            waitagent-*-${{ matrix.arch }}-macos.dmg

  create-release:
    needs:
      - release-linux-x86_64
      - release-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
